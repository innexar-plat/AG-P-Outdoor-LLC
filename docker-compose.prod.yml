version: "3.9"

services:
  sqld:
    image: ghcr.io/tursodatabase/libsql-server:latest
    ports:
      - "8080:8080"
    volumes:
      - sqld_data:/var/lib/sqld
    environment:
      - SQLD_NODE=primary

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/uploads --ignore-existing;
      mc anonymous set download local/uploads;
      echo 'MinIO bucket ready';
      "

  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    command: ["npm", "run", "start", "--prefix", "apps/web"]
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://localhost:3001
      - VITE_ADMIN_URL=http://localhost:3001

  admin:
    build:
      context: .
      dockerfile: Dockerfile.prod
    command: ["npm", "run", "start", "--prefix", "apps/admin"]
    ports:
      - "3001:3001"
    depends_on:
      - sqld
      - minio
    environment:
      - NODE_ENV=production
      - DATABASE_URL=http://sqld:8080
      - BETTER_AUTH_SECRET=dev-secret-change-in-production
      - BETTER_AUTH_URL=http://localhost:3001
      - NEXT_PUBLIC_APP_URL=http://localhost:3001
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY_ID=minioadmin
      - S3_SECRET_ACCESS_KEY=minioadmin
      - S3_BUCKET_NAME=uploads
      - S3_PUBLIC_URL=http://localhost:9000/uploads
      - S3_REGION=us-east-1
      - S3_FORCE_PATH_STYLE=true

volumes:
  sqld_data:
  minio_data:
