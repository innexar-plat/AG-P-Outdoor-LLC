version: "3.9"
services:
  sqld:
    image: ghcr.io/tursodatabase/libsql-server:latest
    # Importante: NÃO publicar 8080 no host (senão bate com o coolify-proxy:8080).
    # Dentro da rede Docker, o admin fala com "http://sqld:8080".
    volumes:
      - sqld_data:/var/lib/sqld
    environment:
      - SQLD_NODE=primary
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      until mc ready local; do echo 'Waiting for MinIO...'; sleep 2; done;
      mc mb local/uploads --ignore-existing;
      mc anonymous set download local/uploads;
      echo 'MinIO bucket ready';
      "
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    command: ["npm", "run", "start", "--prefix", "apps/web"]
    ports:
      - "3000:3000"
    env_file:
      - .env.local
  admin:
    build:
      context: .
      dockerfile: Dockerfile.prod
    command: ["npm", "run", "start", "--prefix", "apps/admin"]
    ports:
      - "3001:3001"
    depends_on:
      - sqld
      - minio
    env_file:
      - .env.local
volumes:
  sqld_data:
  minio_data: