version: "3.9"
services:
  sqld:
    image: ghcr.io/tursodatabase/libsql-server:latest
    labels:
      - "traefik.enable=false"
    # Importante: NÃO publicar 8080 no host (senão bate com o coolify-proxy:8080).
    # Dentro da rede Docker, o admin fala com "http://sqld:8080".
    volumes:
      - sqld_data:/var/lib/sqld
    environment:
      - SQLD_NODE=primary
  minio:
    image: minio/minio:latest
    labels:
      - "traefik.enable=false"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-agpoutdoor-minio}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-please-change-me-very-soon}
    command: server /data --console-address ":9001"
    healthcheck:
      # Ensure MinIO is ready before running the init container.
      test: ["CMD-SHELL", "mc alias set local http://localhost:9000 \"$MINIO_ROOT_USER\" \"$MINIO_ROOT_PASSWORD\" >/dev/null 2>&1 && mc ready local"]
      interval: 5s
      timeout: 5s
      retries: 5
  minio-init:
    image: minio/mc:latest
    # One-shot init job; prevent restart loops.
    restart: "no"
    depends_on:
      - minio
    labels:
      - "traefik.enable=false"
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-agpoutdoor-minio} ${MINIO_ROOT_PASSWORD:-please-change-me-very-soon} >/dev/null 2>&1 && mc ready local >/dev/null 2>&1; do
        echo 'Waiting for MinIO...';
        sleep 2;
      done;
      mc mb local/uploads --ignore-existing;
      mc anonymous set download local/uploads;
      echo 'MinIO bucket ready';
      "
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    command: ["npm", "run", "start", "--prefix", "apps/web"]
    ports:
      - "3000:3000"
    labels:
      - "traefik.enable=true"
      # Route public website by domain (Coolify auto labels may be misconfigured,
      # so we force the rules explicitly).
      - "traefik.http.routers.agp-web-http.priority=1"
      - "traefik.http.routers.agp-web-http.rule=Host(`agpoutdoor.com`) && PathPrefix(`/`) && !PathPrefix(`/admin`) && !PathPrefix(`/api`) && !PathPrefix(`/login`)"
      - "traefik.http.routers.agp-web-https.rule=Host(`agpoutdoor.com`) && PathPrefix(`/`) && !PathPrefix(`/admin`) && !PathPrefix(`/api`) && !PathPrefix(`/login`)"
      - "traefik.http.routers.agp-web-https.priority=1"
      - "traefik.http.routers.agp-web-https.tls=true"
      - "traefik.http.routers.agp-web-https.tls.certresolver=letsencrypt"
    env_file:
      - .env.local
  admin:
    build:
      context: .
      dockerfile: Dockerfile.prod
    command: ["sh", "-c", "npm run db:migrate --prefix apps/admin && npm run db:migrate-carousel --prefix apps/admin && npm run seed --prefix apps/admin && npm run db:migrate-content --prefix apps/admin && npm run start --prefix apps/admin"]
    ports:
      - "3001:3001"
    depends_on:
      - sqld
      - minio
    labels:
      - "traefik.enable=true"
      # Admin panel on /admin/
      - "traefik.http.middlewares.agp-admin-strip.stripprefix.prefixes=/admin"
      - "traefik.http.routers.agp-admin-http.rule=Host(`agpoutdoor.com`) && PathPrefix(`/admin`)"
      - "traefik.http.routers.agp-admin-http.priority=100"
      - "traefik.http.routers.agp-admin-https.rule=Host(`agpoutdoor.com`) && PathPrefix(`/admin`)"
      - "traefik.http.routers.agp-admin-https.priority=100"
      - "traefik.http.routers.agp-admin-https.tls=true"
      - "traefik.http.routers.agp-admin-https.tls.certresolver=letsencrypt"
      # Auth redirect/login pages may hit /login (no /admin prefix).
      - "traefik.http.routers.agp-admin-login-http.rule=Host(`agpoutdoor.com`) && PathPrefix(`/login`)"
      - "traefik.http.routers.agp-admin-login-http.priority=200"
      - "traefik.http.routers.agp-admin-login-https.rule=Host(`agpoutdoor.com`) && PathPrefix(`/login`)"
      - "traefik.http.routers.agp-admin-login-https.priority=200"
      - "traefik.http.routers.agp-admin-login-https.tls=true"
      - "traefik.http.routers.agp-admin-login-https.tls.certresolver=letsencrypt"
      # Public API calls from the browser typically use /api/*.
      - "traefik.http.routers.agp-admin-api-http.rule=Host(`agpoutdoor.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.agp-admin-api-http.priority=200"
      - "traefik.http.routers.agp-admin-api-https.rule=Host(`agpoutdoor.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.agp-admin-api-https.priority=200"
      - "traefik.http.routers.agp-admin-api-https.tls=true"
      - "traefik.http.routers.agp-admin-api-https.tls.certresolver=letsencrypt"
    environment:
      # Keep S3 credentials aligned with MinIO root credentials.
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY_ID=${MINIO_ROOT_USER:-agpoutdoor-minio}
      - S3_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-please-change-me-very-soon}
    env_file:
      - .env.local
volumes:
  sqld_data:
  minio_data: